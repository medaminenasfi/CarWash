name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
        
      - name: Lint backend
        working-directory: ./backend
        run: npm run lint
        
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint || echo "No lint script"
        
      - name: Install admin dependencies
        working-directory: ./admin
        run: npm ci
        
      - name: Lint admin
        working-directory: ./admin
        run: npm run lint || echo "No lint script"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
        
      - name: Build backend
        working-directory: ./backend
        run: npm run build:prod || npm run build || echo "Build script not found"
        
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build || echo "Build script not found"
        
      - name: Install admin dependencies
        working-directory: ./admin
        run: npm ci
        
      - name: Build admin
        working-directory: ./admin
        run: npm run build || echo "Build script not found"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: carwash_user
          POSTGRES_PASSWORD: carwash_password
          POSTGRES_DB: carwash_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7
        ports:
          - 6379:6379
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
        
      - name: Run backend tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: carwash_user
          DB_PASSWORD: carwash_password
          DB_DATABASE: carwash_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: npm test || echo "Test script not found"
