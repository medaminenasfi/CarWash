version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: carwash-postgres
    restart: always
    environment:
      POSTGRES_USER: carwash_user
      POSTGRES_PASSWORD: carwash_password
      POSTGRES_DB: carwash_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-carwashdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: carwash-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@carwash.com
      PGADMIN_DEFAULT_PASSWORD: carwash123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres-carwashdata:
